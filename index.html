<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Pro | Modder Sivasingh 🤌</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff85a1;
            --glass: rgba(255, 255, 255, 0.1);
            --neon: 0 0 25px rgba(255, 77, 109, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: radial-gradient(circle at center, #2d0a1e 0%, #0f0511 100%);
            color: #fff; min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; overflow: hidden;
        }

        /* Branding Top */
        .modder-tag {
            position: fixed; top: 10px; font-weight: 600; color: var(--secondary);
            letter-spacing: 1px; text-shadow: var(--neon); z-index: 1000;
        }

        /* Heart Particles */
        .hearts-bg { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .heart { position: absolute; color: var(--primary); animation: float 5s linear infinite; opacity: 0; }
        @keyframes float {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.3); opacity: 0; }
        }

        .container { z-index: 10; width: 95%; max-width: 450px; text-align: center; }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(25px); border-radius: 35px;
            padding: 30px; border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 60px rgba(0,0,0,0.7);
        }

        h1 { 
            font-size: 2.2rem; background: linear-gradient(45deg, #ff4d6d, #ffb3c1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 15px; filter: drop-shadow(var(--neon));
        }

        input {
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 15px;
            border: none; background: rgba(255, 255, 255, 0.08); color: white;
            text-align: center; outline: none; font-size: 1rem;
        }

        .btn-main {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white; font-weight: 600; cursor: pointer; box-shadow: var(--neon);
            transition: 0.3s;
        }

        /* BOARD DESIGN */
        .ludo-board {
            display: grid; grid-template-columns: repeat(15, 1fr);
            width: 100%; aspect-ratio: 1; margin: 20px 0; border: 3px solid var(--primary);
            border-radius: 20px; overflow: hidden; gap: 1px; background: rgba(0,0,0,0.3);
        }
        .cell { background: rgba(255, 255, 255, 0.03); display: flex; align-items: center; justify-content: center; font-size: 8px; }
        .r-home { background: rgba(255, 77, 109, 0.3); }
        .b-home { background: rgba(78, 205, 196, 0.3); }

        /* CONTROLS */
        .controls { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .control-btn {
            width: 55px; height: 55px; border-radius: 50%; background: var(--glass);
            border: 1px solid rgba(255,255,255,0.2); color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
            transition: 0.3s;
        }
        .control-btn.active { background: var(--primary); box-shadow: var(--neon); }

        .dice-display {
            width: 70px; height: 70px; background: #fff; color: var(--primary);
            border-radius: 18px; font-size: 2.5rem; display: flex; align-items: center;
            justify-content: center; margin: 15px auto; cursor: pointer; box-shadow: var(--neon);
        }

        .hidden { display: none; }
        #status-bar { color: var(--secondary); font-size: 0.9rem; margin-bottom: 10px; font-style: italic; }
    </style>
</head>
<body>

    <div class="modder-tag">Modder - Sivasingh 🤌</div>
    <div class="hearts-bg" id="heart-container"></div>

    <div class="container">
        <div id="setup-card" class="glass-card">
            <h1>Made by @smss1708 💖</h1>
            <input type="text" id="room-input" placeholder="Secret Code">
            <input type="text" id="name-input" placeholder="Your Sweet Name">
            <button class="btn-main" id="join-btn">Start Game Session 🥂</button>
        </div>

        <div id="game-card" class="glass-card hidden">
            <div id="status-bar">Heartbeats syncing...</div>
            <div class="ludo-board" id="board"></div>
            
            <div class="dice-display" id="dice-btn">🎲</div>

            <div class="controls">
                <div class="control-btn" id="mic-btn" title="Zero Noise Voice">🎤</div>
                <div class="control-btn" id="music-btn" title="Play Romance">🎵</div>
                <div class="control-btn" id="skip-btn" title="Next Song">⏭️</div>
            </div>
            <p id="song-info" style="font-size: 0.7rem; margin-top: 10px; color: var(--secondary);"></p>
        </div>
    </div>

    <audio id="bg-audio" loop></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCB-631vxXfLP-Cnnc3jTf7zz_kha8g8qk",
            authDomain: "tic-tac-9253e.firebaseapp.com",
            databaseURL: "https://tic-tac-9253e-default-rtdb.firebaseio.com",
            projectId: "tic-tac-9253e",
            storageBucket: "tic-tac-9253e.firebasestorage.app",
            messagingSenderId: "354573092432",
            appId: "1:354573092432:web:d8f8672b220a80b6fe3355"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myColor, roomId, myName, peer, localStream;
        const playlist = ['love.mp3', 'love1.mp3', 'sad.mp3', 'tere-liye.mp3'];
        let trackIndex = 0;

        document.getElementById('join-btn').onclick = async () => {
            roomId = document.getElementById('room-input').value.trim();
            myName = document.getElementById('name-input').value.trim().replace(/\s+/g, '_');

            if(!roomId || !myName) return alert("Details enter kijiye!");

            const roomRef = ref(db, `ans_ludo/${roomId}`);
            const snap = await get(roomRef);

            if(!snap.exists()) {
                myColor = 'red';
                await set(roomRef, { turn: 'red', p1: myName, dice: 0 });
            } else {
                myColor = 'blue';
                await update(roomRef, { p2: myName });
            }

            startVoiceEngine();
            document.getElementById('setup-card').classList.add('hidden');
            document.getElementById('game-card').classList.remove('hidden');
            buildBoard();
            syncHeartbeats();
        };

        // VOICE CHAT (ZERO NOISE CONTEXT)
        async function startVoiceEngine() {
            peer = new Peer(`MOD_ANS_${roomId}_${myName}`);
            
            peer.on('call', (call) => {
                navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
                }).then(s => {
                    call.answer(s);
                    call.on('stream', rs => { let a = new Audio(); a.srcObject = rs; a.play(); });
                });
            });

            document.getElementById('mic-btn').onclick = async () => {
                const b = document.getElementById('mic-btn');
                if(!localStream) {
                    try {
                        localStream = await navigator.mediaDevices.getUserMedia({
                            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                        });
                        b.classList.add('active');
                        const snap = await get(ref(db, `ans_ludo/${roomId}`));
                        const other = myColor === 'red' ? snap.val().p2 : snap.val().p1;
                        if(other) {
                            const call = peer.call(`MOD_ANS_${roomId}_${other}`, localStream);
                            call.on('stream', rs => { let a = new Audio(); a.srcObject = rs; a.play(); });
                        }
                    } catch(e) { alert("Mic required for voice!"); }
                } else {
                    let enabled = localStream.getAudioTracks()[0].enabled;
                    localStream.getAudioTracks()[0].enabled = !enabled;
                    b.classList.toggle('active', !enabled);
                }
            };
        }

        // MUSIC ENGINE
        const player = document.getElementById('bg-audio');
        document.getElementById('music-btn').onclick = () => {
            if(player.paused) { playTrack(); document.getElementById('music-btn').classList.add('active'); }
            else { player.pause(); document.getElementById('music-btn').classList.remove('active'); }
        };

        document.getElementById('skip-btn').onclick = () => {
            trackIndex = (trackIndex + 1) % playlist.length;
            playTrack();
        };

        function playTrack() {
            player.src = playlist[trackIndex];
            player.play().catch(e => console.log("User interaction needed"));
            document.getElementById('song-info').innerText = "Vibe: " + playlist[trackIndex];
        }

        // GAME LOGIC
        function buildBoard() {
            const b = document.getElementById('board');
            for(let i=0; i<225; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                let r = Math.floor(i/15), c = i%15;
                if(r < 6 && c < 6) cell.classList.add('r-home');
                if(r > 8 && c > 8) cell.classList.add('b-home');
                b.appendChild(cell);
            }
        }

        function syncHeartbeats() {
            onValue(ref(db, `ans_ludo/${roomId}`), (s) => {
                const d = s.val(); if(!d) return;
                document.getElementById('status-bar').innerText = d.turn === myColor ? "Your Turn, Jaan! ❤️" : "Wait for Love... ✨";
                if(d.dice > 0) document.getElementById('dice-btn').innerText = d.dice;
            });
        }

        document.getElementById('dice-btn').onclick = async () => {
            const snap = await get(ref(db, `ans_ludo/${roomId}`));
            if(snap.val().turn !== myColor) return;
            const roll = Math.floor(Math.random() * 6) + 1;
            const next = roll === 6 ? myColor : (myColor === 'red' ? 'blue' : 'red');
            await update(ref(db, `ans_ludo/${roomId}`), { dice: roll, turn: next });
        };

        // FLOAT HEARTS
        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart'; h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 20 + 10) + 'px';
            document.getElementById('heart-container').appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }, 500);

    </script>
</body>
</html>
