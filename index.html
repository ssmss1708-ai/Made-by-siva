<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo made by sivasingh🤌</title>
    <style>
        :root {
            --red: #ff4d6d;
            --blue: #4dabf7;
            --bg: #0a0506;
            --white: #fff0f3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        .header { margin: 15px; text-align: center; }
        h1 { color: var(--red); text-shadow: 0 0 10px rgba(255,77,109,0.5); font-size: 1.5rem; }

        /* LUDO BOARD CSS */
        .ludo-container {
            width: 360px; height: 360px; background: white;
            display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr);
            border: 4px solid #333; box-shadow: 0 0 30px rgba(255, 77, 109, 0.3);
            position: relative;
        }

        .cell { border: 0.1px solid #ddd; background: white; display: flex; align-items: center; justify-content: center; position: relative; }

        /* Zones */
        .red-home { grid-column: 1/7; grid-row: 1/7; background: var(--red); }
        .blue-home { grid-column: 10/16; grid-row: 1/7; background: var(--blue); }
        .white-center { grid-column: 7/10; grid-row: 7/10; background: #eee; font-size: 10px; text-align: center; }

        /* Paths Color */
        .red-path { background: #ffccd5; }
        .blue-path { background: #d0ebff; }
        .safe-spot { background: #ffd166 !important; } /* Star Spot */

        /* Token Styles */
        .token {
            width: 18px; height: 18px; border-radius: 50%; border: 2px solid white;
            cursor: pointer; z-index: 10; position: absolute; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        .token-red { background: var(--red); }
        .token-blue { background: var(--blue); }

        /* UI Controls */
        .controls { margin-top: 20px; width: 360px; display: flex; justify-content: space-around; align-items: center; }
        .dice {
            width: 60px; height: 60px; background: white; border-radius: 12px; color: black;
            display: flex; align-items: center; justify-content: center; font-size: 2rem;
            cursor: pointer; box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }
        .btn { background: var(--red); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        
        .status { margin-top: 10px; font-size: 0.9rem; color: #ffb3c1; }

        /* Overlay */
        .setup-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        input { padding: 12px; border-radius: 10px; border: none; width: 250px; }
        
        .hidden { display: none !important; }
        .rolling { animation: spin 0.2s infinite; }
        @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="setup" class="setup-screen">
        <h1>Made by - sivasingh❤️</h1>
        <input type="text" id="room-id" placeholder="Create/Enter Room Code">
        <input type="text" id="player-name" placeholder="Your Name">
        <button id="join-btn" class="btn">Connect Heart to Heart</button>
    </div>

    <div class="header">
        <h1>Modder - @snss1708 ❤️</h1>
        <div id="turn-info">Waiting for partner...</div>
    </div>

    <div class="ludo-container" id="board">
        </div>

    <div class="controls">
        <div id="dice" class="dice">🎲</div>
        <button id="roll-btn" class="btn">Roll Dice</button>
    </div>
    
    <div class="status" id="status-msg">Roll to start!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Config (Using your project)
        const firebaseConfig = {
            apiKey: "AIzaSyCB-631vxXfLP-Cnnc3jTf7zz_kha8g8qk",
            authDomain: "tic-tac-9253e.firebaseapp.com",
            databaseURL: "https://tic-tac-9253e-default-rtdb.firebaseio.com",
            projectId: "tic-tac-9253e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let roomId, myPlayerId, isMyTurn = false;
        const boardEl = document.getElementById('board');

        // LUDO MAP (Simplified for Web)
        function createBoard() {
            for (let i = 0; i < 225; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `c-${i}`;
                // Basic coloring logic for Ludo shape
                let row = Math.floor(i / 15);
                let col = i % 15;
                
                if (row < 6 && col < 6) cell.classList.add('red-home');
                if (row < 6 && col > 8) cell.classList.add('blue-home');
                if (row > 6 && row < 8 && col < 6) cell.classList.add('red-path');
                if (row < 6 && col === 7) cell.classList.add('blue-path');
                if (row === 7 && col === 7) cell.innerHTML = "❤️";
                
                boardEl.appendChild(cell);
            }
        }
        createBoard();

        document.getElementById('join-btn').addEventListener('click', async () => {
            roomId = document.getElementById('room-id').value.trim();
            if (!roomId) return alert("Enter Room!");

            const roomRef = ref(db, `ludo_pro/${roomId}`);
            const snap = await get(roomRef);

            if (!snap.exists()) {
                myPlayerId = 'red';
                await set(roomRef, {
                    turn: 'red',
                    diceValue: 1,
                    redPos: [0, 0, 0, 0], // 0 means inside base
                    bluePos: [0, 0, 0, 0]
                });
            } else {
                myPlayerId = 'blue';
            }

            document.getElementById('setup').classList.add('hidden');
            startSync();
        });

        function startSync() {
            onValue(ref(db, `ludo_pro/${roomId}`), (snap) => {
                const data = snap.val();
                if (!data) return;

                isMyTurn = data.turn === myPlayerId;
                document.getElementById('turn-info').innerText = isMyTurn ? "Your Turn Baby! 😘" : "Waiting for partner... ❤️";
                document.getElementById('dice').innerText = data.diceValue;

                // Render Tokens
                updateTokens(data);
            });
        }

        function updateTokens(data) {
            document.querySelectorAll('.token').forEach(t => t.remove());
            // Render Red Tokens
            data.redPos.forEach((pos, i) => {
                const cellId = pos === 0 ? `c-${32 + i}` : `c-${pos}`;
                addTokenToCell(cellId, 'red', i);
            });
            // Render Blue Tokens
            data.bluePos.forEach((pos, i) => {
                const cellId = pos === 0 ? `c-${40 + i}` : `c-${pos}`;
                addTokenToCell(cellId, 'blue', i);
            });
        }

        function addTokenToCell(cellId, color, index) {
            const cell = document.getElementById(cellId);
            if (!cell) return;
            const token = document.createElement('div');
            token.className = `token token-${color}`;
            token.onclick = () => moveToken(index);
            cell.appendChild(token);
        }

        document.getElementById('roll-btn').addEventListener('click', async () => {
            if (!isMyTurn) return;
            const dice = document.getElementById('dice');
            dice.classList.add('rolling');

            setTimeout(async () => {
                dice.classList.remove('rolling');
                const val = Math.floor(Math.random() * 6) + 1;
                
                await update(ref(db, `ludo_pro/${roomId}`), {
                    diceValue: val,
                    // Auto switch turn if no move possible (simplified logic)
                    turn: val === 6 ? myPlayerId : (myPlayerId === 'red' ? 'blue' : 'red')
                });
                
                if(val === 6) {
                    document.getElementById('status-msg').innerText = "WOW! 6! Nikalo token ❤️";
                }
            }, 400);
        });

        async function moveToken(index) {
            if (!isMyTurn) return;
            // Yahan par aap token ko aage badhane ka logic (Path mapping) daal sakte hain
            // Filhal simplicity ke liye hum click par base se nikalne ka logic rakhte hain
            document.getElementById('status-msg').innerText = "Moving token... 🚀";
        }

    </script>
</body>
</html>
