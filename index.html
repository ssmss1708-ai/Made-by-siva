<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Love ❤️ - let's play</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ffb3c1;
            --glow: 0 0 20px rgba(255, 77, 109, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: radial-gradient(circle at center, #2b0d12 0%, #0a0506 100%);
            color: white; min-height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* Top Credit */
        .top-credit { 
            position: fixed; top: 0; left: 0; width: 100%; 
            font-size: 1.1rem; color: #fff; z-index: 1000; 
            background: linear-gradient(90deg, #ff4d6d, #ff00ff, #ff4d6d);
            padding: 8px; font-weight: bold; text-align: center;
            text-shadow: 0 0 10px white; animation: glow-text 2s infinite linear;
        }
        @keyframes glow-text { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        /* Charo Kone ke Music Icons */
        .corner-music {
            position: fixed; width: 50px; height: 50px;
            background: var(--primary); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; cursor: pointer; z-index: 1500;
            box-shadow: var(--glow); border: 2px solid white;
            animation: pulse-music 2s infinite;
        }
        .m-tl { top: 60px; left: 20px; }
        .m-tr { top: 60px; right: 20px; }
        .m-bl { bottom: 20px; left: 20px; }
        .m-br { bottom: 20px; right: 20px; }

        @keyframes pulse-music {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(255, 77, 109, 0); }
            100% { transform: scale(1); }
        }

        /* Gift Blast Animation */
        #gift-layer { position: fixed; inset: 0; pointer-events: none; z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .blast {
            font-size: 120px; position: absolute;
            animation: gift-blast-anim 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes gift-blast-anim {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(2.5) rotate(20deg); opacity: 1; filter: drop-shadow(0 0 20px gold); }
            100% { transform: scale(3.5) rotate(-20deg); opacity: 0; filter: blur(15px); }
        }

        /* Main Game Layout */
        .container { z-index: 10; width: 95%; max-width: 400px; text-align: center; margin-top: 40px; }
        .card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 25px; border: 1px solid rgba(255, 77, 109, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .cell {
            aspect-ratio: 1; background: rgba(255,255,255,0.07); border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem; cursor: pointer; transition: 0.3s;
        }
        
        .gift-bar { display: flex; justify-content: space-around; margin: 10px 0; gap: 5px; }
        .gift-btn { background: rgba(255,255,255,0.1); font-size: 1.5rem; padding: 8px; border-radius: 12px; border: 1px solid var(--secondary); flex: 1; cursor: pointer; }

        .chat-box { height: 80px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; margin: 10px 0; font-size: 0.8rem; text-align: left; }
        .hidden { display: none !important; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; }
        button#join-btn { background: var(--primary); color: white; padding: 12px; width: 100%; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }

    </style>
</head>
<body>

    <div class="top-credit">Made by - @smss1708</div>

    <div class="corner-music m-tl" onclick="playSong('love.mp3')">🎵</div>
    <div class="corner-music m-tr" onclick="playSong('tere-liye.mp3')">🎶</div>
    <div class="corner-music m-bl" onclick="playSong('sad.mp3')">🎻</div>
    <div class="corner-music m-br" onclick="playSong('love1.mp3')">💝</div>

    <div id="gift-layer"></div>

    <div class="container">
        <div id="setup-section" class="card">
            <h1>Love Cloud ❤️</h1>
            <input type="text" id="room-id" placeholder="Room Code">
            <input type="text" id="player-name" placeholder="Your Name">
            <button id="join-btn">Join Realtime</button>
        </div>

        <div id="game-section" class="card hidden">
            <div id="turn-indicator">Connecting...</div>
            <div class="board" id="board">
                <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
            </div>

            <div class="gift-bar">
                <button class="gift-btn" onclick="sendGift('❤️')">❤️</button>
                <button class="gift-btn" onclick="sendGift('🌹')">🌹</button>
                <button class="gift-btn" onclick="sendGift('🔥')">🔥</button>
                <button class="gift-btn" onclick="sendGift('🍫')">🍫</button>
            </div>

            <div class="chat-box" id="chat-box"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="chat-input" placeholder="Message..." style="margin:0;">
                <button id="send-chat" style="background:var(--primary); border:none; border-radius:10px; width:50px;">🚀</button>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCB-631vxXfLP-Cnnc3jTf7zz_kha8g8qk",
            authDomain: "tic-tac-9253e.firebaseapp.com",
            databaseURL: "https://tic-tac-9253e-default-rtdb.firebaseio.com",
            projectId: "tic-tac-9253e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let roomId, myName, mySymbol, isMyTurn = false;
        const bgMusic = document.getElementById('bg-music');

        document.getElementById('join-btn').addEventListener('click', async () => {
            roomId = document.getElementById('room-id').value.trim();
            myName = document.getElementById('player-name').value.trim();
            if (!roomId || !myName) return alert("Fill all fields");

            const roomRef = ref(db, `rooms/${roomId}`);
            const snapshot = await get(roomRef);

            if (!snapshot.exists()) {
                mySymbol = '💕';
                await set(roomRef, { board: Array(9).fill(""), turn: '💕', p1: myName });
            } else {
                mySymbol = '💖';
                await update(roomRef, { p2: myName });
            }

            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('game-section').classList.remove('hidden');
            startSync();
        });

        function startSync() {
            onValue(ref(db, `rooms/${roomId}`), (snap) => {
                const data = snap.val();
                if (!data) return;
                data.board.forEach((val, i) => document.querySelector(`[data-index="${i}"]`).innerText = val);
                isMyTurn = data.turn === mySymbol;
                document.getElementById('turn-indicator').innerText = isMyTurn ? "Your Turn!" : "Partner's Turn...";
            });

            // Sync Gift Blast
            onValue(ref(db, `rooms/${roomId}/blast`), (snap) => {
                const blast = snap.val();
                if (blast && blast.sender !== myName) {
                    showBlastEffect(blast.emoji);
                }
            });
        }

        // Tic Tac Toe Move
        document.querySelectorAll('.cell').forEach(cell => {
            cell.addEventListener('click', async () => {
                const idx = cell.dataset.index;
                if (!isMyTurn || cell.innerText !== "") return;
                const snap = await get(ref(db, `rooms/${roomId}`));
                const board = snap.val().board;
                board[idx] = mySymbol;
                update(ref(db, `rooms/${roomId}`), { board, turn: mySymbol === '💖' ? '💕' : '💖' });
            });
        });

        // Gift & Blast Logic
        window.sendGift = (emoji) => {
            set(ref(db, `rooms/${roomId}/blast`), { sender: myName, emoji: emoji, time: Date.now() });
            showBlastEffect(emoji);
        };

        function showBlastEffect(emoji) {
            const layer = document.getElementById('gift-layer');
            const el = document.createElement('div');
            el.className = 'blast';
            el.innerText = emoji;
            layer.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        // Music Control
        window.playSong = (file) => {
            bgMusic.src = file;
            bgMusic.play().catch(() => alert("Click once on screen then play!"));
        };

        // Chat Logic
        document.getElementById('send-chat').addEventListener('click', () => {
            const inp = document.getElementById('chat-input');
            if (inp.value) {
                push(ref(db, `rooms/${roomId}/chats`), { sender: myName, text: inp.value });
                inp.value = '';
            }
        });

        onValue(ref(db, `rooms/${roomId}/chats`), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            snap.forEach(c => {
                const m = c.val();
                box.innerHTML += `<div><b>${m.sender}:</b> ${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
