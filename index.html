<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Love ❤️ - let's play</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ffb3c1;
            --glow: 0 0 20px rgba(255, 77, 109, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: radial-gradient(circle at center, #2b0d12 0%, #0a0506 100%);
            color: white; min-height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .top-credit { position: fixed; top: 15px; font-size: 0.8rem; color: var(--secondary); z-index: 1000; }

        .background-balloons { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .balloon {
            position: absolute; bottom: -100px; padding: 10px 15px; border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            color: white; font-size: 12px; font-weight: bold; animation: float up linear forwards;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            100% { transform: translateY(-120vh) rotate(20deg); opacity: 0; }
        }

        .container { z-index: 10; width: 90%; max-width: 400px; text-align: center; }
        h1 { color: var(--primary); text-shadow: var(--glow); margin-bottom: 20px; font-size: 2.2rem; }

        .card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            padding: 25px; border-radius: 25px; border: 1px solid rgba(255, 77, 109, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        input {
            width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px;
            border: 1px solid rgba(255, 77, 109, 0.3); background: rgba(255,255,255,0.1);
            color: white; text-align: center; outline: none;
        }

        button {
            background: var(--primary); color: white; border: none; padding: 14px;
            border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s;
        }

        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 25px 0; }
        .cell {
            aspect-ratio: 1; background: rgba(255,255,255,0.07); border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            font-size: 2.5rem; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .cell:hover { background: rgba(255, 77, 109, 0.15); transform: scale(1.05); }

        .status-bar { display: flex; justify-content: space-between; margin-bottom: 15px; color: var(--secondary); font-weight: bold; }

        /* Floating Buttons */
        .controls { position: fixed; bottom: 25px; width: 100%; display: flex; justify-content: center; gap: 40px; z-index: 1000; }
        .fab {
            width: 55px; height: 55px; border-radius: 50%; border: none;
            color: white; cursor: pointer; font-size: 22px; box-shadow: var(--glow); transition: 0.3s;
        }
        .btn-music { background: var(--primary); }
        .btn-mic { background: #4dabf7; }
        .btn-mic.active { background: #ff922b; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(255,146,43,0.7); } 100% { box-shadow: 0 0 0 15px rgba(255,146,43,0); } }

        .overlay { position: fixed; inset: 0; background: rgba(10, 5, 6, 0.95); z-index: 100; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .hidden { display: none !important; }

        /* Result Popup */
        #result-overlay {
            background: rgba(0,0,0,0.85);
            position: absolute; inset: 0; border-radius: 25px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50;
        }
        #result-text { font-size: 1.5rem; margin-bottom: 20px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-credit">Made by - @smss1708</div>

    <div id="loading-screen" class="overlay hidden">
        <p id="status-text">Connecting to Love Cloud...</p>
    </div>

    <div class="background-balloons" id="balloon-container"></div>

    <div class="container">
        <h1>Realtime Love ❤️</h1>
        
        <div id="setup-section" class="card">
            <input type="text" id="room-id" placeholder="Enter Room Code">
            <input type="text" id="player-name" placeholder="Your Name">
            <button id="join-btn">Join Game & Voice</button>
        </div>

        <div id="game-section" class="card hidden" style="position: relative;">
            <div id="result-overlay" class="hidden">
                <div id="result-text">Winner!</div>
                <button id="next-game-btn" style="width: 80%;">Play Next Game 🎮</button>
            </div>
            
            <div class="status-bar">
                <div id="display-room">Room: -</div>
                <div id="turn-indicator">Connecting...</div>
            </div>
            <div class="board" id="board">
                <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
            </div>
            <button id="reset-btn" style="background:transparent; border:1px solid var(--primary)">Manual Reset</button>
        </div>
    </div>

    <div class="controls">
        <button id="mic-btn" class="fab btn-mic">🎤</button>
        <button id="music-btn" class="fab btn-music">🎵</button>
    </div>

    <audio id="bg-music" src="love.mp3" loop></audio>
    <div id="remote-audio-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCB-631vxXfLP-Cnnc3jTf7zz_kha8g8qk",
            authDomain: "tic-tac-9253e.firebaseapp.com",
            databaseURL: "https://tic-tac-9253e-default-rtdb.firebaseio.com",
            projectId: "tic-tac-9253e",
            storageBucket: "tic-tac-9253e.firebasestorage.app",
            messagingSenderId: "354573092432",
            appId: "1:354573092432:web:d8f8672b220a80b6fe3355"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let roomId, mySymbol, isMyTurn = false, gameActive = true;
        let peer, localStream;

        const micBtn = document.getElementById('mic-btn');
        const musicBtn = document.getElementById('music-btn');
        const bgMusic = document.getElementById('bg-music');
        const resultOverlay = document.getElementById('result-overlay');
        const resultText = document.getElementById('result-text');

        // VOICE CONFIG (Noise Reduction)
        const voiceConstraints = {
            audio: {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true
            }
        };

        // JOIN LOGIC
        document.getElementById('join-btn').addEventListener('click', async () => {
            const rId = document.getElementById('room-id').value.trim();
            const pName = document.getElementById('player-name').value.trim();
            if (!rId || !pName) return alert("Details bhariye!");

            roomId = rId;
            document.getElementById('loading-screen').classList.remove('hidden');

            initVoiceChat(pName);

            const roomRef = ref(db, `rooms/${roomId}`);
            const snapshot = await get(roomRef);

            if (!snapshot.exists()) {
                mySymbol = '❤️';
                await set(roomRef, { board: Array(9).fill(""), turn: '❤️', winner: "", p1: pName, p1_peer: pName });
            } else {
                mySymbol = '😘';
                await update(roomRef, { p2: pName, p2_peer: pName });
            }

            document.getElementById('display-room').innerText = "Room: " + roomId;
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('game-section').classList.remove('hidden');
            startSync();
        });

        // TURN & GAME SYNC
        function startSync() {
            onValue(ref(db, `rooms/${roomId}`), (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                data.board.forEach((val, idx) => {
                    const cell = document.querySelector(`.cell[data-index="${idx}"]`);
                    cell.innerText = val;
                });

                isMyTurn = (data.turn === mySymbol);
                document.getElementById('turn-indicator').innerText = isMyTurn ? "Your Turn!" : "Partner's Turn...";
                
                if (data.winner) {
                    gameActive = false;
                    resultOverlay.classList.remove('hidden');
                    if(data.winner === 'draw') {
                        resultText.innerText = "It's a Draw! 🤝";
                    } else {
                        resultText.innerText = data.winner === mySymbol ? "You Won! 💕" : "Partner Won! 💖";
                    }
                } else {
                    // Game is ongoing or reset
                    gameActive = true;
                    resultOverlay.classList.add('hidden');
                }
                document.getElementById('loading-screen').classList.add('hidden');
            });
        }

        // CLICK LOGIC
        document.querySelectorAll('.cell').forEach(cell => {
            cell.addEventListener('click', async () => {
                const idx = cell.dataset.index;
                if (!isMyTurn || cell.innerText !== "" || !gameActive) return;

                const roomSnap = await get(ref(db, `rooms/${roomId}`));
                const board = roomSnap.val().board;
                board[idx] = mySymbol;

                const winPatterns = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                let winner = null;
                for (let p of winPatterns) {
                    if (board[p[0]] && board[p[0]] === board[p[1]] && board[p[0]] === board[p[2]]) winner = board[p[0]];
                }
                const isDraw = !board.includes("") && !winner;

                await update(ref(db, `rooms/${roomId}`), {
                    board: board,
                    turn: mySymbol === '❤️' ? '😘' : '❤️',
                    winner: winner || (isDraw ? 'draw' : "")
                });
            });
        });

        // NEXT GAME BUTTON
        document.getElementById('next-game-btn').addEventListener('click', () => {
            update(ref(db, `rooms/${roomId}`), { board: Array(9).fill(""), winner: "", turn: "❤️" });
        });

        // VOICE CHAT (MIC) LOGIC
        async function initVoiceChat(pName) {
            peer = new Peer(roomId + "_" + pName);

            peer.on('call', (call) => {
                navigator.mediaDevices.getUserMedia(voiceConstraints).then((stream) => {
                    call.answer(stream);
                    call.on('stream', (remoteStream) => playRemoteStream(remoteStream));
                });
            });

            micBtn.addEventListener('click', async () => {
                if (!localStream) {
                    try {
                        localStream = await navigator.mediaDevices.getUserMedia(voiceConstraints);
                        micBtn.classList.add('active');
                        const otherPlayer = mySymbol === '❤️' ? 'p2' : 'p1';
                        const roomSnap = await get(ref(db, `rooms/${roomId}`));
                        const otherName = roomSnap.val()[otherPlayer + "_peer"];
                        
                        if (otherName) {
                            const call = peer.call(roomId + "_" + otherName, localStream);
                            call.on('stream', (remoteStream) => playRemoteStream(remoteStream));
                        }
                    } catch (err) {
                        alert("Mic access denied!");
                    }
                } else {
                    const enabled = localStream.getAudioTracks()[0].enabled;
                    localStream.getAudioTracks()[0].enabled = !enabled;
                    micBtn.classList.toggle('active', !enabled);
                }
            });
        }

        function playRemoteStream(stream) {
            let audio = document.getElementById('remote-audio-el');
            if(!audio) {
                audio = document.createElement('audio');
                audio.id = 'remote-audio-el';
                document.getElementById('remote-audio-container').appendChild(audio);
            }
            audio.srcObject = stream;
            audio.play();
        }

        // UI Extras
        musicBtn.addEventListener('click', () => {
            if (bgMusic.paused) { bgMusic.play(); musicBtn.innerText = '⏸️'; }
            else { bgMusic.pause(); musicBtn.innerText = '🎵'; }
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            update(ref(db, `rooms/${roomId}`), { board: Array(9).fill(""), winner: "", turn: "❤️" });
        });

        // Balloons
        setInterval(() => {
            const b = document.createElement('div');
            b.className = 'balloon';
            b.style.left = Math.random() * 90 + 'vw';
            b.style.background = '#ff4d6d';
            b.style.width = b.style.height = (Math.random() * 20 + 60) + 'px';
            b.style.animationDuration = (Math.random() * 3 + 5) + 's';
            b.innerText = "Sivasingh ❤️";
            document.getElementById('balloon-container').appendChild(b);
            setTimeout(() => b.remove(), 6000);
        }, 1500);
    </script>
</body>
</html>
